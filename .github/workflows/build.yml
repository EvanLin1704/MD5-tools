name: build

# Builds the portable (no-install) binaries for Windows, Linux and macOS.
# Trigger manually from the Actions tab, or by pushing a version tag like v1.0.0.
on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

# Only standard GitHub-hosted runners and first-party actions are used here,
# so this stays within the free tier (free for public repos; for private repos
# it consumes the monthly free minutes, and a free account is never charged
# beyond them — jobs simply stop when the quota runs out).
jobs:
  build:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            name: windows
            platform: win
            artifact_glob: release/*.exe
          - os: ubuntu-latest
            name: linux
            platform: linux
            artifact_glob: release/*.AppImage
          - os: macos-latest
            name: macos
            platform: mac
            artifact_glob: release/*.zip

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate app icon
        run: npm run icon:generate

      - name: Build Angular + Electron
        run: npm run build

      - name: Package portable binary
        run: npx electron-builder --${{ matrix.platform }} --publish never
        env:
          # No code signing: keeps macOS builds free (no Apple Developer account).
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: md5-tools-${{ matrix.name }}
          path: ${{ matrix.artifact_glob }}
          if-no-files-found: error
